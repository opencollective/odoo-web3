<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odoo Invoices</title>
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.294.0/lucide.min.css"
    />
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto",
          "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans",
          "Helvetica Neue", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .sidebar-enter {
        transform: translateX(100%);
      }
      .sidebar-enter-active {
        transform: translateX(0);
        transition: transform 300ms ease-out;
      }
      .sidebar-exit {
        transform: translateX(0);
      }
      .sidebar-exit-active {
        transform: translateX(100%);
        transition: transform 300ms ease-in;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- Load RootApp (it will import other components) -->
    <script type="module" src="/js/components/RootApp.jsx"></script>

    <!-- Initialize app -->
    <script type="module" src="/js/app.jsx"></script>
  </body>
</html>
